# ================================================
# MAE 3D — Single config to run 3D video MAE
# ================================================
# Merges model (MAE_3D_resnet) + data (MAE_3D_data) + training defaults.
# Usage: python train.py --config configs/MAE_3D_full.yaml
# ================================================

# --- Model (from MAE_3D_resnet) ---
model: mae_3d
backbone: MAER3D18Backbone
pretrained: false
channels: 1
hidden_dim: 256
normalize_loss: true

# --- Data (from MAE_3D_data) ---
dataset_name: vsd_mae
split_csv_path: "Data/FoundationData/ProcessedData/splits/split_v1_seed17_strat_monkey.csv"
stats_json_path: "Data/FoundationData/ProcessedData/splits/baseline_stats_v1_seed17_strat_monkey.json"
processed_root: "Data/FoundationData/ProcessedData/splits"
frame_start: 30
frame_end: 100
clip_length: 8
mask_ratio: 0.5
patch_size: [4, 8, 8]
crop_frame: null
crop_radius: null
batch_size: 32
num_workers: 4
pin_memory: true
persistent_workers: true
prefetch_factor: 2

# --- Training ---
lr: 1.0e-4
weight_decay: 0.05
epochs: 100
max_grad_norm: 1.0
ckpt_dir: ./checkpoints
log_dir: logs
seed: 17
preload_into_ram: true
